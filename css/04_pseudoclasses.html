<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /* Ważne aby nadawać je w takiej kolejności */
        /* ------------------------------------------*/
        a:link{
            color: teal;
        }
        a:visited{
            color: silver;
        }
        a:hover{
            background-color: yellow;
            color: red;
        }
        a:active{
            color: green;
        }
        /* ------------------------------------------*/

        input[type="checkbox"]:checked + label{
            font-weight: bold;
            color: red;
        }
        input[type="checkbox"]:checked{
            box-shadow: 0 0 0 3px red;
        }

        input[type="text"]:disabled{
            background-color: lightgray;
            border: 2px solid darkgray;
        }

        p:first-child{
            color: aqua;
        }

        p:last-child{
            color: orange;
        }

        p:nth-child(even){
            font-weight: bold;
        }
        p:nth-child(odd){
            font-style: italic;
        }
        p:nth-child(5){
            background-color: red;
        }
        P:nth-child(3n){
            font-size: larger;
        }

        input:focus{
            background-color: lightgreen;
        }
        p:not(.intro){
            text-decoration: underline;
        }
        p.intro:not(.box){
            background-color: aquamarine;
        }
        p:not(.intro):not(.content):not(.end){
            font-size: 20px;
        }
    </style>
</head>
<body>
    <form action="">
        <input type="checkbox" name="system" id="android">
        <label for="android">Android</label>
        <input type="checkbox" name="system" id="ios">
        <label for="android">iOs</label>
        <input disabled type="text" name="text" id="text" value="Jakiś tekst">
        <input type="text" name="text2" id="text2" value="Jakiś tekst2">
        <input type="text" name="text3" id="text3" value="Jakiś tekst3">
    </form>
    <ul>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Regulamin</a></li>
        <li><a href="#">TOS</a></li>
        <li><a href="#">O mnie</a></li>
    </ul>

    <div>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p class="intro">Lorem ipsum dolor sit amet.</p>
        <p class="intro box">Lorem ipsum dolor sit amet.</p>
        <p class="content">Lorem ipsum dolor sit amet.</p>
        <p class="intro">Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p class="end">Lorem ipsum dolor sit amet.</p>
    </div>
</body>
</html>
