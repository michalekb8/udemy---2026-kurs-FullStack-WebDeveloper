<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        .serif{
            font-family: 'Times New Roman', Times, serif;
        }

        .sans-serif{
            font-family: Arial, Helvetica, sans-serif;
        }

        .monospace{
            font-family: monospace, 'Lucida Console';
        }

        .roboto{
            font-family: 'roboto', sans-serif;
            font-size: xx-large;
        }

        .bold{
            font-weight: bold;

        }

        h1{
            font-size: 1.5rem;
        }

        body{
            font-size: 14px;
        }

        .italic{
            font-style: italic;
        }

        .red{
            color: red;
            border-width: 3px;
            border-style: dotted;
        }

        .small{
            font-variant: small-caps;
        }

        .font1{
            font: italic bold 18px/32px Arial, Helvetica;
        }
    </style>
</head>
<body>
    <h1>Nagłówek</h1>
    <p class="serif italic">Lorem ipsum dolor sit amet.</p>
    <p class="sans-serif bold">Lorem ipsum dolor sit amet.</p>
    <p class="monospace red">Lorem <span class="small"> ipsum dolor</span> sit amet.</p>
    <p class="roboto">Lorem ipsum dolor sit amet.</p>
    <p class="font1">Lorem ipsum dolor sit amet.</p>
</body>
</html>
