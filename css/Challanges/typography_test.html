<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .content1{
            text-transform: uppercase;
            text-decoration: underline;
            text-decoration-style: double;
            text-decoration-color: red;
            text-align: center;
            line-height: 30px;
        }

        .content2{
            text-transform: lowercase;
            text-decoration: line-through;
            text-decoration-style: dotted;
            text-decoration-color: green;
            text-align: right;
        }

        .content3{
            text-indent: 20px;
            word-spacing: 10px;
            letter-spacing: 5px;
        }

        .content4{
            text-shadow: 3px 2px 5px green;
        }
    </style>
</head>
<body>
    <article class="content1">Lorem ipsum dolor sit amet consectetur adipisicing elit. Ab, placeat?</article>
    <article class="content2">Qui nulla voluptatum unde excepturi, enim quidem sunt repellendus in?</article>
    <article class="content3">Rerum labore quam ad, incidunt dignissimos aspernatur veniam esse accusamus.</article>
    <article class="content4">Qui illo pariatur quos recusandae doloribus similique. Dolorum, repellendus aut.</article>
</body>
</html>
