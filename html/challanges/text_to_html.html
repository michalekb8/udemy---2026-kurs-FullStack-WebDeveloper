<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekst na HTML</title>
</head>
<body>
    <!--
        1) Stwórz dokument html5 z tytułem: "tekst na html",
           pamiętaj o skorzystaniu z znaku ! aby utworzyć
           podstawowy szablon html5.
        2) Dodaj nagłówek h1 o treści: "Pierwsza strona"
        3) Dodaj dwa paragrafy korzystając z taga p z treścią:
          - "Przykładowa strona napisana w html."
          - "Jedna z wielu które powstaną podczas kursu."
        4) Pogrub słowo "html" i "wielu" z tagiem b, dodaj
           kursywę z tagiem i dla słowa "kursu"
    -->
           <h1>Pierwsza strona</h1>
           <p>Przykładowa strona napisana w <b>html</b>.</p>
           <p>Jedna z <b>wielu</b> które powstaną podczas <i>kursu</i>.</p>
</body>
</html>
