<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        flex-direction: row; /* column, row, row-reverse, column-reverse*/
        flex-wrap: wrap; /* nowrap, wrap, wrap-reverse */
        justify-content: space-between; /* wyrównywanie w poziomie center, flex-start, flex-end, space-between, space-around, space-evenly*/
        align-items: center; /* wyrównanie w pionie flex-start, flex-end, center, stretch (cała wysokość), baseline(na lini bazowej) */
        border: 2px solid red;
        height: 800px;
      }

      .container div {
        margin: 5px;
        width: 50px;
        height: 50px;
        background-color: green;
        text-align: center;
        line-height: 50px;
      }

      div.h100 {
        height: 100px;
        background-color: orange;
      }

      div.h120 {
        height: 120px;
        background-color: red;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div class="h100">6</div>
      <div class="h120">7</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
      <div>11</div>
      <div>12</div>
      <div>13</div>
      <div>14</div>
      <div>15</div>
      <div>16</div>
      <div>17</div>
      <div>18</div>
      <div>19</div>
      <div>20</div>
      <div>21</div>
      <div>22</div>
      <div>23</div>
      <div>24</div>
      <div>25</div>
      <div>26</div>
      <div>27</div>
      <div>28</div>
      <div>29</div>
      <div>30</div>
    </div>
  </body>
</html>
